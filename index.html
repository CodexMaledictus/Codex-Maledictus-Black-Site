<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Maledictus | Black Site</title>
    <style>
        /* OVERARCHING AESTHETIC */
        body, html {
            margin: 0; padding: 0; background-color: #030303; color: #8c0000;
            font-family: 'Courier New', Courier, monospace; overflow-x: hidden;
        }

        /* DIGITAL CONTAMINATION SCANLINES */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        /* ROTATING OCCULT SIGIL BACKGROUND */
        .occult-bg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80vw; color: rgba(139, 0, 0, 0.03); z-index: 0;
            animation: rotateSigil 120s linear infinite; pointer-events: none; user-select: none;
        }
        @keyframes rotateSigil { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* CONTAINER ARRANGEMENT */
        .container {
            position: relative; z-index: 3; max-width: 900px; margin: 0 auto; padding: 40px 20px; text-align: center;
        }

        /* GLITCH TITLE */
        .glitch-title {
            font-size: 3rem; font-weight: bold; text-transform: uppercase; letter-spacing: 5px;
            color: #b8860b; /* Tarnished Gold */
            position: relative; text-shadow: 2px 2px 5px #4a0000; margin-bottom: 10px;
        }
        .glitch-title::before, .glitch-title::after {
            content: "CODEX MALEDICTUS"; position: absolute; top: 0; left: 0; right: 0;
            background: #030303; color: #8c0000; overflow: hidden;
        }
        .glitch-title::before {
            left: 2px; text-shadow: -2px 0 red; animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }
        .glitch-title::after {
            left: -2px; text-shadow: -2px 0 #b8860b; animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); } 20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); } 60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); } 100% { clip-path: inset(30% 0 20% 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(15% 0 85% 0); } 20% { clip-path: inset(70% 0 20% 0); }
            40% { clip-path: inset(30% 0 40% 0); } 60% { clip-path: inset(90% 0 10% 0); }
            80% { clip-path: inset(5% 0 80% 0); } 100% { clip-path: inset(45% 0 35% 0); }
        }

        .subtitle { font-size: 1rem; color: #555; margin-bottom: 50px; letter-spacing: 2px; }

        /* THE SCRYING MIRROR (YOUTUBE) */
        .scrying-mirror {
            margin: 0 auto 50px auto; padding: 10px; border: 2px solid #b8860b;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5), inset 0 0 15px rgba(184, 134, 11, 0.2);
            background: rgba(10, 0, 0, 0.8); max-width: 600px;
        }
        .mirror-label {
            font-size: 0.9rem; color: #b8860b; text-transform: uppercase; margin-bottom: 10px;
            letter-spacing: 3px; border-bottom: 1px solid #4a0000; padding-bottom: 5px;
        }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; filter: sepia(0.3) contrast(1.2) brightness(0.8); }

        /* NAVIGATION GRID */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        
        .artifact-link {
            display: block; padding: 20px; text-decoration: none; border: 1px solid #4a0000;
            background: rgba(15, 0, 0, 0.6); color: #8c0000; transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        .artifact-link:hover {
            background: #2a0000; color: #b8860b; border-color: #b8860b; box-shadow: 0 0 15px rgba(184, 134, 11, 0.4);
        }
        .artifact-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .artifact-desc { font-size: 0.8rem; color: #666; }

        /* THE PHYSICAL VESSEL (BOOK LINK) */
        .altar-link {
            display: block; padding: 30px; margin-top: 40px; text-decoration: none;
            border: 2px solid #8c0000; background: linear-gradient(to bottom, rgba(30, 0, 0, 0.8), rgba(10, 0, 0, 1));
            color: #b8860b; text-transform: uppercase; letter-spacing: 4px; font-size: 1.5rem;
            transition: all 0.4s ease; box-shadow: 0 0 30px rgba(139, 0, 0, 0.6);
        }
        .altar-link:hover {
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.8); background: #1a0000; text-shadow: 0 0 10px #ff0000;
        }

    </style>
</head>
<body>

    <div class="occult-bg">🜏</div>

    <div class="container">
        <div class="glitch-title">CODEX MALEDICTUS</div>
        <div class="subtitle">[CLASSIFIED CONTAINMENT NODE] // THE SIGNAL IS LEAKING</div>

        <div class="scrying-mirror">
            <div class="mirror-label">The Initial Breach (First Emanation)</div>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0&controls=1&rel=0" allowfullscreen></iframe>
            </div>
        </div>

        <div class="nav-grid">
            <a href="#" class="artifact-link">
                <div class="artifact-title">Ritual Chants</div>
                <div class="artifact-desc">Industrial Horror Audio Intercepts</div>
            </a>
            <a href="#" class="artifact-link">
                <div class="artifact-title">Recovered Fragments</div>
                <div class="artifact-desc">Access World Anvil Lore Database</div>
            </a>
        </div>

        <a href="#" class="altar-link">
            Open The Physical Vessel<br>
            <span style="font-size: 0.8rem; color: #8c0000; letter-spacing: 2px;">(The Codex That Remembers You)</span>
        </a>
    </div>

</body>
</html>
