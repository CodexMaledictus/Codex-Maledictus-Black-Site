<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEX BLACK SITE // RECOVERY</title>
    <style>
        :root { --p: #00ff66; --bg: #030403; --gold: #b8860b; }

        /* THE TEXTURED VOID - FIXING THE "FLAT BLACK" */
        body {
            margin: 0; background: var(--bg); color: var(--p);
            font-family: 'Courier New', monospace; overflow-x: hidden;
        }

        /* SVG NOISE OVERLAY */
        .void-texture {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.08; pointer-events: none;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .container { position: relative; z-index: 10; max-width: 1000px; margin: 0 auto; padding: 50px 20px; }

        /* THE EMANATION (VIDEO) */
        .video-vault {
            border: 1px solid var(--p); padding: 10px; background: #000;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.1); margin-bottom: 40px;
        }
        .video-vault iframe { width: 100%; aspect-ratio: 16/9; border: none; }

        /* INTERACTIVE PATH (THE RPG ELEMENT) */
        .memory-reconstruction {
            border: 1px solid rgba(0, 255, 102, 0.2); background: rgba(0, 15, 0, 0.4);
            padding: 30px; text-align: left; margin-top: 40px;
        }
        .path-text { font-size: 0.9rem; margin-bottom: 25px; line-height: 1.6; color: #fff; }
        .choice-btn {
            display: block; width: 100%; padding: 15px; border: 1px solid var(--p);
            background: transparent; color: var(--p); text-align: left;
            margin-bottom: 10px; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        .choice-btn:hover { background: var(--p); color: #000; }

        /* NAVIGATION */
        .nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 50px; }
        .nav-link {
            border: 1px solid var(--gold); padding: 15px; text-decoration: none;
            color: var(--gold); font-size: 0.7rem; text-align: center; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="void-texture"></div>

<div class="container">
    <header style="text-align: center; margin-bottom: 60px;">
        <h1 style="letter-spacing: 15px; margin: 0;">CODEX BLACK SITE</h1>
        <div style="font-size: 0.6rem; opacity: 0.5;">SOURCE: ELVAIN VHRIS // RECOVERY_LOG_001</div>
    </header>

    <div class="video-vault">
        <iframe src="https://www.youtube.com/embed/lDo91ztT_ZQ?modestbranding=1&rel=0"></iframe>
    </div>

    <div class="memory-reconstruction" id="rpg-node">
        <div class="path-text" id="node-desc">
            The signal is stabilizing. "Infection Remembers." You hear the voice of Elvain Vhris echoing through the static. The memory is fractured. How do you approach the breach?
        </div>
        <button class="choice-btn" onclick="nextPath('resonate')">LISTEN TO THE RESONANCE</button>
        <button class="choice-btn" onclick="nextPath('shield')">REINFORCE DIGITAL CONTAINMENT</button>
    </div>

    <div class="nav">
        <a href="https://open.spotify.com/artist/1vKFBmWToCei9dCSePXuow?si=rP0eOqW-TAOHF90ZfTfjOg" class="nav-link">RITUAL TRANSMISSIONS</a>
        <a href="https://www.worldanvil.com/w/codex-maledictus-codexmaledictus" class="nav-link">FRAGMENT RECOVERY</a>
        <a href="https://www.amazon.com/dp/B0FQ9QDMQ2" class="nav-link">PHYSICAL VESSEL</a>
    </div>
</div>

<script>
    function nextPath(choice) {
        const desc = document.getElementById('node-desc');
        const node = document.getElementById('rpg-node');
        
        if(choice === 'resonate') {
            desc.innerHTML = "The lyrics bleed into your vision: 'The infection is a mirror.' You feel a pull toward the Void. Do you surrender your identity to the Codex?";
            node.innerHTML = `
                <div class="path-text">${desc.innerHTML}</div>
                <button class="choice-btn" onclick="window.open('https://www.worldanvil.com/w/codex-maledictus-codexmaledictus', '_blank')">SURRENDER (ACCESS LORE)</button>
                <button class="choice-btn" onclick="location.reload()">RESIST (REBOOT TERMINAL)</button>
            `;
        } else if (choice === 'shield') {
            desc.innerHTML = "Containment fails. The golden inscriptions on the book glow with a heat that shouldn't exist. The physical vessel calls to you.";
            node.innerHTML = `
                <div class="path-text">${desc.innerHTML}</div>
                <button class="choice-btn" onclick="window.open('https://www.amazon.com/dp/B0FQ9QDMQ2', '_blank')">EXAMINE THE BOOK</button>
                <button class="choice-btn" onclick="location.reload()">ABANDON SIGNAL</button>
            `;
        }
    }
</script>

</body>
</html>
