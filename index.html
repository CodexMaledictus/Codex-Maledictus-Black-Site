<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // CODEX BLACK SITE</title>
    <style>
        :root {
            --glow: #00ff41;
            --dim-glow: #003b00;
            --bg: #050505;
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg);
            color: var(--glow); font-family: 'Courier New', monospace;
            overflow-x: hidden; height: 100vh;
        }

        /* THE CRT CURVATURE EFFECT */
        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(18, 16, 16, 0) 40%, rgba(0, 0, 0, 0.9) 100%);
            pointer-events: none; z-index: 10;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px; z-index: 11; pointer-events: none; opacity: 0.3;
        }

        /* ROTATING ESOTERIC GEOMETRY */
        .occult-sigil {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 70vw; color: rgba(0, 255, 65, 0.04); z-index: 0;
            animation: rotate 180s linear infinite; pointer-events: none;
        }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .container {
            position: relative; z-index: 5; max-width: 850px; margin: 0 auto;
            padding: 60px 20px; text-align: center; filter: drop-shadow(0 0 5px var(--dim-glow));
        }

        /* INTERACTIVE TERMINAL HEADER */
        .header { margin-bottom: 40px; border-bottom: 1px solid var(--dim-glow); padding-bottom: 20px; }
        .glitch {
            font-size: 2.5rem; font-weight: bold; text-transform: uppercase;
            letter-spacing: 8px; animation: flicker 0.15s infinite;
        }
        @keyframes flicker {
            0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.8; }
        }

        /* VIDEO CONTAINMENT FIELD */
        .containment-unit {
            border: 1px solid var(--glow); background: rgba(0, 20, 0, 0.5);
            padding: 15px; box-shadow: 0 0 30px var(--dim-glow); margin-bottom: 40px;
        }
        .status-bar { font-size: 0.7rem; text-align: left; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border: 1px solid var(--dim-glow); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; filter: brightness(0.8) sepia(0.2) hue-rotate(80deg); }

        /* INTERACTIVE PORTALS */
        .portals { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .node {
            border: 1px solid var(--dim-glow); padding: 25px; text-decoration: none;
            color: var(--glow); transition: all 0.2s; position: relative;
        }
        .node:hover {
            background: var(--glow); color: black; box-shadow: 0 0 20px var(--glow);
            transform: scale(1.02); cursor: pointer;
        }
        .node-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
        .node-desc { font-size: 0.7rem; opacity: 0.8; }

        /* THE BOOK ALTAR */
        .physical-vessel {
            display: block; margin-top: 30px; border: 2px solid var(--glow);
            padding: 30px; text-decoration: none; color: var(--glow);
            font-size: 1.4rem; font-weight: bold; letter-spacing: 5px;
            box-shadow: 0 0 40px var(--dim-glow); transition: 0.4s;
        }
        .physical-vessel:hover { background: #111; border-color: #fff; text-shadow: 0 0 10px #fff; }

    </style>
</head>
<body>

<div class="crt-overlay"></div>
<div class="scanlines"></div>
<div class="occult-sigil">🜏</div>

<div class="container">
    <div class="header">
        <div class="glitch">CODEX BLACK SITE</div>
        <div style="font-size: 0.8rem; letter-spacing: 3px; margin-top: 10px;">[BREACH DETECTED] // RITUAL SIGNAL ACTIVE</div>
    </div>

    <div class="containment-unit">
        <div class="status-bar">
            <span>FILE: CHRONICLE_01.MP4</span>
            <span>STATUS: EMANATING</span>
        </div>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/lDo91ztT_ZQ?autoplay=0&controls=1&modestbranding=1" allowfullscreen></iframe>
        </div>
    </div>

    <div class="portals">
        <a href="https://open.spotify.com/artist/1vKFBmWToCei9dCSePXuow?si=rP0eOqW-TAOHF90ZfTfjOg" target="_blank" class="node">
            <div class="node-title">RITUAL CHANTS</div>
            <div class="node-desc">Active Spotify Intercepts</div>
        </a>
        <a href="https://www.worldanvil.com/w/codex-maledictus-codexmaledictus" target="_blank" class="node">
            <div class="node-title">FRAGMENT RECOVERY</div>
            <div class="node-desc">World Anvil Lore Access</div>
        </a>
    </div>

    <a href="https://www.amazon.com/dp/B0FQ9QDMQ2" target="_blank" class="physical-vessel">
        THE CODEX THAT REMEMBERS YOU
        <div style="font-size: 0.6rem; margin-top: 5px; font-weight: normal; letter-spacing: 2px;">[OPEN PHYSICAL VESSEL]</div>
    </a>
</div>

</body>
</html>
